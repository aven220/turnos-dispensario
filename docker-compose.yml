services:
  postgres:
    image: postgres:16-alpine
    container_name: turnos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: turnos
      POSTGRES_PASSWORD: turnos123
      POSTGRES_DB: turnos_dispensario
    ports:
      - "127.0.0.1:5544:5432"
    volumes:
      - turnos_pg_data:/var/lib/postgresql/data

volumes:
  turnos_pg_data:
