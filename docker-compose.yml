# PostgreSQL LOCAL gratuito — aislado, sin suscripciones.
# Solo escucha en 127.0.0.1:5544 (no interfiere con otros programas).
# Uso: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: turnos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: turnos
      POSTGRES_PASSWORD: TdCencoic2026Disp
      POSTGRES_DB: turnos_dispensario
    ports:
      - "127.0.0.1:5544:5432"
    volumes:
      - turnos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U turnos -d turnos_dispensario']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  turnos_pg_data:
